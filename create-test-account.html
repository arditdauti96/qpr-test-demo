<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krijo Llogari Test</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .test-account-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .credentials-box {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #FFD700;
        }
        .credentials-box h3 {
            color: #FFD700;
            margin-top: 0;
        }
        .credentials-box p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin: 10px 0;
        }
        .credentials-box code {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 16px;
            color: #FFD700;
        }
        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .info-text {
            color: rgba(255, 255, 255, 0.7);
            margin: 20px 0;
        }
    </style>
</head>
<body class="application-body">
    <div class="container">
        <div class="test-account-container">
            <h2 style="color: #FFD700; text-align: center;">Krijo Llogari Test</h2>
            
            <div class="credentials-box">
                <h3>Kredencialet e Test:</h3>
                <p><strong>Email:</strong> <code>test@qpr.al</code></p>
                <p><strong>Password:</strong> <code>test123</code></p>
            </div>
            
            <div class="info-text">
                <p>Kjo faqe do të krijojë një llogari test me:</p>
                <ul style="color: rgba(255, 255, 255, 0.8);">
                    <li>Email: test@qpr.al</li>
                    <li>Password: test123</li>
                    <li>2 aplikime test për të shfaqur në dashboard</li>
                </ul>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn" onclick="createTestAccount()">Krijo Llogarinë Test</button>
                <button class="btn btn-secondary" onclick="window.location.href='login.html'">Shko te Login</button>
            </div>
            
            <div id="result" style="margin-top: 20px; padding: 15px; border-radius: 10px; display: none;"></div>
        </div>
    </div>

    <script>
        function formatDateForDisplay(value) {
            if (!value) return '';
            
            if (value instanceof Date) {
                const day = value.getDate().toString().padStart(2, '0');
                const month = (value.getMonth() + 1).toString().padStart(2, '0');
                const year = value.getFullYear();
                return `${day}-${month}-${year}`;
            }
            
            if (typeof value === 'string') {
                const displayMatch = value.match(/^(\d{2})-(\d{2})-(\d{4})$/);
                if (displayMatch) {
                    return value;
                }
                
                const isoMatch = value.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (isoMatch) {
                    const [, year, month, day] = isoMatch;
                    return `${day}-${month}-${year}`;
                }
                
                const parsed = Date.parse(value);
                if (!isNaN(parsed)) {
                    return formatDateForDisplay(new Date(parsed));
                }
            }
            
            return value;
        }

        function createTestAccount() {
            const email = 'test@qpr.al';
            const password = 'test123';
            
            // Create user account
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Remove existing test user if exists
            users = users.filter(u => u.email !== email);
            
            // Create new test user
            const testUser = {
                email: email,
                password: password,
                createdAt: new Date().toISOString(),
                applications: []
            };
            
            users.push(testUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Create test applications
            let applications = JSON.parse(localStorage.getItem('applications') || '[]');
            
            // Remove existing test applications
            applications = applications.filter(app => app.email !== email);
            
            // Create first test application (pending)
            const firstSubmittedDate = formatDateForDisplay(new Date(Date.now() - 7 * 24 * 60 * 60 * 1000));
            const app1 = {
                id: 'APP-' + Date.now() + '-1',
                type: 'Ushtar Aktiv',
                email: email,
                status: 'pending',
                submittedDate: firstSubmittedDate,
                personalData: {
                    firstName: 'Agron',
                    lastName: 'Krasniqi',
                    birthDate: formatDateForDisplay('1995-05-15'),
                    placeOfBirth: 'Tiranë',
                    address: 'Rruga Dritan Hoxha, Nr. 12, Tiranë',
                    phone: '+355692123456',
                    email: email
                },
                educationData: {
                    level: 'Arsim i Mesëm i Plotë',
                    institution: 'Gjimnazi "Ismail Qemali"',
                    graduationYear: '2013'
                },
                preferredUnit: 'Ushtria e Tokës',
                motivation: 'Dëshiroj të shërbej në Forcat e Armatosura të Shqipërisë për të mbrojtur atdheun dhe për të dhënë kontributin tim për sigurinë e vendit.',
                formData: {
                    gjinia: 'Mashkull',
                    gjendja_civile: 'Beqar'
                }
            };
            
            // Create second test application (reviewed)
            const secondSubmittedDate = formatDateForDisplay(new Date(Date.now() - 3 * 24 * 60 * 60 * 1000));
            const app2 = {
                id: 'APP-' + Date.now() + '-2',
                type: 'Oficer - Akademi',
                email: email,
                status: 'reviewed',
                submittedDate: secondSubmittedDate,
                personalData: {
                    firstName: 'Agron',
                    lastName: 'Krasniqi',
                    birthDate: formatDateForDisplay('1995-05-15'),
                    placeOfBirth: 'Tiranë',
                    address: 'Rruga Dritan Hoxha, Nr. 12, Tiranë',
                    phone: '+355692123456',
                    email: email
                },
                educationData: {
                    level: 'Arsim i Lartë',
                    institution: 'Universiteti i Tiranës',
                    graduationYear: '2017'
                },
                preferredUnit: 'Akademia e Forcave të Armatosura',
                motivation: 'Dëshiroj të shkaktoj trajtim në Akademinë e Forcave të Armatosura për të bërë karrierë si oficer profesionist.',
                formData: {
                    gjinia: 'Mashkull',
                    gjendja_civile: 'Beqar'
                },
                comments: 'Aplikimi është në shqyrtim. Dokumentet janë të plotë dhe kandidati plotëson kërkesat bazë.'
            };
            
            applications.push(app1, app2);
            localStorage.setItem('applications', JSON.stringify(applications));
            
            // Update user applications list
            testUser.applications = [app1.id, app2.id];
            users = users.map(u => u.email === email ? testUser : u);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Auto-login the user
            localStorage.setItem('applicantEmail', email);
            localStorage.setItem('applicantLoggedIn', 'true');
            
            // Show success message
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.style.background = 'rgba(40, 167, 69, 0.2)';
            resultDiv.style.border = '1px solid rgba(40, 167, 69, 0.5)';
            resultDiv.innerHTML = `
                <h3 style="color: #28A745; margin-top: 0;">✅ Llogaria u krijua me sukses!</h3>
                <p style="color: rgba(255, 255, 255, 0.9);">
                    <strong>Email:</strong> ${email}<br>
                    <strong>Password:</strong> ${password}<br><br>
                    2 aplikime test u krijuan. Ju do të ridrejtoheni automatikisht në dashboard...
                </p>
            `;
            
            // Redirect to dashboard after 2 seconds
            setTimeout(() => {
                window.location.href = 'applicant-dashboard.html';
            }, 2000);
        }
        
        // Check if test account already exists
        window.addEventListener('DOMContentLoaded', function() {
            const email = 'test@qpr.al';
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userExists = users.find(u => u.email === email);
            
            if (userExists) {
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.style.background = 'rgba(255, 165, 0, 0.2)';
                resultDiv.style.border = '1px solid rgba(255, 165, 0, 0.5)';
                resultDiv.innerHTML = `
                    <p style="color: rgba(255, 255, 255, 0.9);">
                        ℹ️ Llogaria test ekziston tashmë. Kliko "Krijo Llogarinë Test" për ta rikrijuar ose 
                        <a href="login.html" style="color: #FFD700; text-decoration: underline;">shko te Login</a>.
                    </p>
                `;
            }
        });
    </script>
</body>
</html>
