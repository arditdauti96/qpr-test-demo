<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="militaryGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#militaryGrad2)"/>
  <!-- Silhouette of man in military uniform, profile right -->
  <g fill="#4a2c7a" opacity="0.9">
    <!-- Head -->
    <ellipse cx="600" cy="200" rx="75" ry="85"/>
    <!-- Military cap -->
    <rect x="525" y="120" width="150" height="30" rx="5"/>
    <ellipse cx="600" cy="150" rx="75" ry="20"/>
    <!-- Shoulders with military uniform -->
    <path d="M 525 310 Q 525 350 545 350 Q 565 350 585 340 Q 600 335 615 340 Q 635 350 655 350 Q 675 350 675 310"/>
    <!-- Upper body in uniform -->
    <ellipse cx="600" cy="440" rx="85" ry="110"/>
    <!-- Badge/shoulder patch -->
    <circle cx="635" cy="370" r="15" fill="#ffd700" opacity="0.8"/>
    <!-- Short hair under cap -->
    <path d="M 535 150 Q 520 160 530 170 Q 540 180 560 175 Q 580 170 600 175 Q 620 170 640 175 Q 660 180 670 170 Q 680 160 665 150 L 600 150 Z"/>
  </g>
</svg>

